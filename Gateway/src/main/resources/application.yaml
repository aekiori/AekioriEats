server:
    port: ${SERVER_PORT:8088}

spring:
    application:
        name: Gateway
    cloud:
        gateway:
            routes:
                - id: auth-service
                  uri: ${GATEWAY_AUTH_SERVICE_URI:http://localhost:8084}
                  predicates:
                      - Path=/api/v1/auth/**
                - id: user-service
                  uri: ${GATEWAY_USER_SERVICE_URI:http://localhost:8082}
                  predicates:
                      - Path=/api/v1/users/**
                - id: order-service
                  uri: ${GATEWAY_ORDER_SERVICE_URI:http://localhost:8081}
                  predicates:
                      - Path=/api/v1/orders/**
                - id: store-service
                  uri: ${GATEWAY_STORE_SERVICE_URI:http://localhost:8085}
                  predicates:
                      - Path=/api/v1/stores/**,/api/v1/owner/stores/**
                - id: payment-service
                  uri: ${GATEWAY_PAYMENT_SERVICE_URI:http://localhost:8086}
                  predicates:
                      - Path=/api/v1/payments/**
                - id: point-service
                  uri: ${GATEWAY_POINT_SERVICE_URI:http://localhost:8087}
                  predicates:
                      - Path=/api/v1/points/**

gateway:
    auth:
        jwt:
            secret: ${AUTH_JWT_SECRET:auth-super-secret-auth-super-secret-2026}

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    metrics:
        distribution:
            percentiles-histogram:
                http.server.requests: true
        tags:
            application: ${spring.application.name}
