version: 1

# Kafka topic manifest for local/dev.
# 운영에서는 이 파일을 기준으로 Terraform/Ansible로 동기화하는 것을 권장.
topics:
  # Kafka Connect internal topics
  - name: connect-configs
    partitions: 1
    replicationFactor: 1
    configs:
      cleanup.policy: compact

  - name: connect-offsets
    partitions: 25
    replicationFactor: 1
    configs:
      cleanup.policy: compact

  - name: connect-status
    partitions: 5
    replicationFactor: 1
    configs:
      cleanup.policy: compact

  # Debezium schema history topics
  - name: schemahistory.delivery.order
    partitions: 1
    replicationFactor: 1
    configs:
      cleanup.policy: delete
      retention.ms: 9223372036854775807
      retention.bytes: -1

  - name: schemahistory.delivery.user
    partitions: 1
    replicationFactor: 1
    configs:
      cleanup.policy: delete
      retention.ms: 9223372036854775807
      retention.bytes: -1

  - name: schemahistory.delivery.auth
    partitions: 1
    replicationFactor: 1
    configs:
      cleanup.policy: delete
      retention.ms: 9223372036854775807
      retention.bytes: -1

  - name: schemahistory.delivery.store
    partitions: 1
    replicationFactor: 1
    configs:
      cleanup.policy: delete
      retention.ms: 9223372036854775807
      retention.bytes: -1

  # Debezium source topics
  - name: delivery.delivery_order.outbox
    partitions: 1
    replicationFactor: 1

  - name: delivery.delivery_user.outbox
    partitions: 1
    replicationFactor: 1

  - name: delivery.delivery_auth.outbox
    partitions: 1
    replicationFactor: 1

  - name: delivery.delivery_store.outbox
    partitions: 1
    replicationFactor: 1

  # SMT routed event topics
  - name: outbox.event.ORDER
    partitions: 1
    replicationFactor: 1

  - name: outbox.event.USER
    partitions: 1
    replicationFactor: 1

# 현재 운영/개발에서 존재할 수 있는 레거시 토픽(검증 시 경고 제외 대상)
allowUnexpectedTopics:
  - delivery.delivery.outbox
  - schemahistory.delivery
  - __consumer_offsets
