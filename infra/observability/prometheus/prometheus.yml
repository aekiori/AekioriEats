global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: auth
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8084

  - job_name: user
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082

  - job_name: order
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: store
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8085

  - job_name: payment
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8086
