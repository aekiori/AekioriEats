server:
    port: ${SERVER_PORT:8081}

spring:
    application:
        name: Order

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/delivery_order}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:root}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        database-platform: org.hibernate.dialect.MySQLDialect
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
    flyway:
        enabled: true

    logging:
        level:
            org.flywaydb: DEBUG

    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: ${SPRING_DATA_REDIS_PORT:6379}

    kafka:
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        consumer:
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

order:
    event:
        consumer:
            retry-attempts: ${ORDER_EVENT_CONSUMER_RETRY_ATTEMPTS:3}
            retry-interval-ms: ${ORDER_EVENT_CONSUMER_RETRY_INTERVAL_MS:1000}

    idempotency:
        lock-ttl-seconds: ${ORDER_IDEMPOTENCY_LOCK_TTL_SECONDS:30}
        result-ttl-seconds: ${ORDER_IDEMPOTENCY_RESULT_TTL_SECONDS:600}

    outbox:
        order-created-topic: ${ORDER_OUTBOX_ORDER_CREATED_TOPIC:outbox.event.OrderCreated}
        order-status-changed-topic: ${ORDER_OUTBOX_ORDER_STATUS_CHANGED_TOPIC:outbox.event.OrderStatusChanged}
        payment-requested-topic: ${ORDER_OUTBOX_PAYMENT_REQUESTED_TOPIC:outbox.event.PaymentRequested}
        publisher-consumer-group: ${ORDER_OUTBOX_PUBLISHER_CONSUMER_GROUP:order-outbox-status}
    store-validation-event:
        order-validated-topic: ${ORDER_STORE_VALIDATION_EVENT_ORDER_VALIDATED_TOPIC:outbox.event.OrderValidated}
        order-rejected-topic: ${ORDER_STORE_VALIDATION_EVENT_ORDER_REJECTED_TOPIC:outbox.event.OrderRejected}
        consumer-group: ${ORDER_STORE_VALIDATION_EVENT_CONSUMER_GROUP:order-store-validation}
    payment-result-event:
        payment-succeeded-topic: ${ORDER_PAYMENT_RESULT_EVENT_PAYMENT_SUCCEEDED_TOPIC:outbox.event.PaymentSucceeded}
        payment-failed-topic: ${ORDER_PAYMENT_RESULT_EVENT_PAYMENT_FAILED_TOPIC:outbox.event.PaymentFailed}
        payment-refunded-topic: ${ORDER_PAYMENT_RESULT_EVENT_PAYMENT_REFUNDED_TOPIC:outbox.event.PaymentRefunded}
        consumer-group: ${ORDER_PAYMENT_RESULT_EVENT_CONSUMER_GROUP:order-payment-result}
    store-order-decision-event:
        order-accepted-topic: ${ORDER_STORE_ORDER_DECISION_EVENT_ORDER_ACCEPTED_TOPIC:outbox.event.StoreOrderAccepted}
        order-rejected-topic: ${ORDER_STORE_ORDER_DECISION_EVENT_ORDER_REJECTED_TOPIC:outbox.event.StoreOrderRejected}
        consumer-group: ${ORDER_STORE_ORDER_DECISION_EVENT_CONSUMER_GROUP:order-store-order-decision}
    internal:
        api-key: ${ORDER_INTERNAL_API_KEY:order-internal-dev-key}

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    metrics:
        distribution:
            percentiles-histogram:
                http.server.requests: true
        tags:
            application: ${spring.application.name}

springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
