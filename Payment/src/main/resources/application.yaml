server:
    port: ${SERVER_PORT:8086}

spring:
    application:
        name: Payment

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/delivery_payment}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:root}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        database-platform: org.hibernate.dialect.MySQLDialect

    flyway:
        enabled: true
        table: flyway_schema_history_payment
        baseline-on-migrate: true
        baseline-version: 0

    kafka:
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        consumer:
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

payment:
    internal:
        api-key: ${PAYMENT_INTERNAL_API_KEY:payment-internal-dev-key}

    event:
        consumer:
            retry-attempts: ${PAYMENT_EVENT_CONSUMER_RETRY_ATTEMPTS:3}
            retry-interval-ms: ${PAYMENT_EVENT_CONSUMER_RETRY_INTERVAL_MS:1000}

    portone:
        verify-enabled: ${PAYMENT_PORTONE_VERIFY_ENABLED:false}
        api-base-url: ${PAYMENT_PORTONE_API_BASE_URL:https://api.portone.io}
        api-secret: ${PAYMENT_PORTONE_API_SECRET:}
        store-id: ${PAYMENT_PORTONE_STORE_ID:}
    order-event:
        payment-requested-topic: ${PAYMENT_ORDER_EVENT_PAYMENT_REQUESTED_TOPIC:outbox.event.PaymentRequested}
        payment-requested-consumer-group: ${PAYMENT_ORDER_EVENT_PAYMENT_REQUESTED_CONSUMER_GROUP:payment-payment-requested}
        order-status-changed-topic: ${PAYMENT_ORDER_EVENT_ORDER_STATUS_CHANGED_TOPIC:outbox.event.OrderStatusChanged}
        refund-request-consumer-group: ${PAYMENT_ORDER_EVENT_REFUND_REQUEST_CONSUMER_GROUP:payment-refund-request}

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    metrics:
        distribution:
            percentiles-histogram:
                http.server.requests: true
        tags:
            application: ${spring.application.name}

springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
