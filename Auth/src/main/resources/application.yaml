server:
    port: ${SERVER_PORT:8084}

spring:
    application:
        name: Auth

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/delivery_auth}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:root}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        database-platform: org.hibernate.dialect.MySQLDialect

    flyway:
        enabled: true
        table: flyway_schema_history_auth
        baseline-on-migrate: true
        baseline-version: 0

    kafka:
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        consumer:
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

auth:
    jwt:
        secret: ${AUTH_JWT_SECRET:auth-super-secret-auth-super-secret-2026}
        issuer: ${AUTH_JWT_ISSUER:aekiori-eats}
        access-token-expiration-seconds: ${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
        refresh-token-expiration-seconds: ${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
    bloom:
        enabled: ${AUTH_BLOOM_ENABLED:true}
        expected-insertions: ${AUTH_BLOOM_EXPECTED_INSERTIONS:5000000}
        fpp: ${AUTH_BLOOM_FPP:0.01}
        warmup-batch-size: ${AUTH_BLOOM_WARMUP_BATCH_SIZE:10000}
    token:
        cleanup:
            cron: ${AUTH_TOKEN_CLEANUP_CRON:0 0 5 * * *}
            batch-size: ${AUTH_TOKEN_CLEANUP_BATCH_SIZE:500}
    rate-limit:
        enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
        cleanup-threshold: ${AUTH_RATE_LIMIT_CLEANUP_THRESHOLD:100000}
        signup:
            ip:
                request-limit: ${AUTH_RATE_LIMIT_SIGNUP_IP_REQUEST_LIMIT:20}
                rate-limit-period-seconds: ${AUTH_RATE_LIMIT_SIGNUP_IP_RATE_LIMIT_PERIOD_SECONDS:60}
            account:
                request-limit: ${AUTH_RATE_LIMIT_SIGNUP_ACCOUNT_REQUEST_LIMIT:5}
                rate-limit-period-seconds: ${AUTH_RATE_LIMIT_SIGNUP_ACCOUNT_RATE_LIMIT_PERIOD_SECONDS:300}
        login:
            ip:
                request-limit: ${AUTH_RATE_LIMIT_LOGIN_IP_REQUEST_LIMIT:60}
                rate-limit-period-seconds: ${AUTH_RATE_LIMIT_LOGIN_IP_RATE_LIMIT_PERIOD_SECONDS:60}
            account:
                request-limit: ${AUTH_RATE_LIMIT_LOGIN_ACCOUNT_REQUEST_LIMIT:10}
                rate-limit-period-seconds: ${AUTH_RATE_LIMIT_LOGIN_ACCOUNT_RATE_LIMIT_PERIOD_SECONDS:300}

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    metrics:
        distribution:
            percentiles-histogram:
                http.server.requests: true
        tags:
            application: ${spring.application.name}
