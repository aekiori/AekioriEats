server:
    port: ${SERVER_PORT:8082}

spring:
    application:
        name: User

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/delivery_user}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:root}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        database-platform: org.hibernate.dialect.MySQLDialect

    flyway:
        enabled: true
        table: flyway_schema_history_user
        baseline-on-migrate: true
        baseline-version: 0

    kafka:
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        consumer:
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

user:
    event:
        source-topic: ${USER_EVENT_SOURCE_TOPIC:delivery.delivery_auth.outbox}
        smt-topic: ${USER_EVENT_SMT_TOPIC:outbox.event.USER}
        user-created-consumer-group: ${USER_EVENT_USER_CREATED_CONSUMER_GROUP:user-created-projection}
        consumer:
            retry-attempts: ${USER_EVENT_CONSUMER_RETRY_ATTEMPTS:3}
            retry-interval-ms: ${USER_EVENT_CONSUMER_RETRY_INTERVAL_MS:1000}

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    metrics:
        distribution:
            percentiles-histogram:
                http.server.requests: true
        tags:
            application: ${spring.application.name}
